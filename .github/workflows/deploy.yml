name: Build and Deploy to Vercel

# 仅手动触发（避免递归）。自动更新由 blog-update.yml 处理。
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 5'  # 每周五凌晨1点（北京时间9点）

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update blog content
        run: |
          python3 tools/update_blog.py --generate || true
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --cached --quiet || git commit -m "Weekly content update $(date +'%Y-%m-%d')"

      - name: Build static site
        run: python3 build.py

      - name: Push built site to GitHub (触发 Vercel 部署)
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true
          branch: master
          # only: site/  # 可选：只推送 site/ 目录